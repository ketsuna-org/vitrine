backend:
  name: github
  repo: ketsuna-org/vitrine
  branch: master
  use_graphql: true
  base_url: https://decap-proxy.ketsuna.workers.dev
  squash_merges: true

site_url: https://bot-creator.fr
publish_mode: editorial_workflow
media_folder: assets
public_folder: assets

collections:
  - name: tutorials_en
    label: Tutorials EN
    label_singular: English tutorial
    folder: _posts
    create: true
    filter:
      field: locale
      value: en
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "EN | {{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - {
          label: Primary Category,
          name: category,
          widget: select,
          options: ["Setup", "Runner", "Introduction", "Components", "Embeds", "User", "Moderation", "Channels", "Roles", "Bot", "Server", "Blacklists", "Arguments & Conditions", "Text"],
          default: "Setup",
          required: true
        }
      - { label: Function Syntax, name: function_syntax, widget: string, required: false, hint: "For BDFD functions, e.g., $ping or $customEmbed[title;text]" }
      - { label: Date, name: date, widget: datetime, required: false }
      - {
          label: Categories,
          name: categories,
          widget: list,
          required: false,
          allow_add: true,
        }
      - { label: Featured Image, name: thumbnail, widget: image, required: false }
      - { label: Author, name: author, widget: string, default: Garder500 }
      - {
          label: Translation Key,
          name: translation_key,
          widget: string,
          hint: Use the same key for the EN and FR versions of the same article,
        }
      - { label: Locale, name: locale, widget: hidden, default: en }
      - { label: Content Language, name: content_language, widget: hidden, default: en }
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Generate TOC, name: toc, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }

  - name: tutorials_fr
    label: Tutoriels FR
    label_singular: Tutoriel francais
    folder: _posts
    create: true
    filter:
      field: locale
      value: fr
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "FR | {{title}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - {
          label: Categorie Principale,
          name: category,
          widget: select,
          options: ["Setup", "Runner", "Introduction", "Components", "Embeds", "User", "Moderation", "Channels", "Roles", "Bot", "Server", "Blacklists", "Arguments & Conditions", "Text"],
          default: "Setup",
          required: true
        }
      - { label: Syntaxe de la Fonction, name: function_syntax, widget: string, required: false, hint: "Pour les fonctions BDFD, e.g., $ping ou $customEmbed[title;text]" }
      - { label: Date, name: date, widget: datetime, required: false }
      - {
          label: Categories,
          name: categories,
          widget: list,
          required: false,
          allow_add: true,
        }
      - { label: Image de couverture, name: thumbnail, widget: image, required: false }
      - { label: Auteur, name: author, widget: string, default: Garder500 }
      - {
          label: Cle de traduction,
          name: translation_key,
          widget: string,
          hint: Utilisez la meme cle pour les versions EN et FR d'un meme article,
        }
      - { label: Locale, name: locale, widget: hidden, default: fr }
      - { label: Langue du contenu, name: content_language, widget: hidden, default: fr }
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Generer le sommaire, name: toc, widget: boolean, default: true }
      - { label: Contenu, name: body, widget: markdown }
