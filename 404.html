---
permalink: /404.html
layout: default
title: Page not found
description: The route you requested does not exist.
locale: en
content_language: en
---
{% assign t = site.data.locales[page.locale] %}

<section class="site-grid page-section not-found-shell">
  <div class="not-found-card" data-reveal>
    <span class="eyebrow-pill">404</span>
    <h1>{{ t.not_found.title }}</h1>
    <p>{{ t.not_found.body }}</p>
    <div class="button-row">
      <a class="button button-primary" href="{{ t.paths.home | relative_url }}">{{ t.not_found.cta }}</a>
      <a class="button button-secondary" href="{{ t.paths.guides | relative_url }}">{{ t.nav.guides }}</a>
    </div>
  </div>
</section>
