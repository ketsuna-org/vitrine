---
layout: default
title: Discord Login
locale: en
permalink: /auth/callback
sitemap: false
---

<div class="min-h-[80vh] flex items-center justify-center px-6">
  <div id="auth-callback-container" class="w-full max-w-md">
    <!-- Loading -->
    <div id="auth-loading" class="flex flex-col items-center gap-6 text-center">
      <div class="h-16 w-16 rounded-2xl bg-primary/20 border border-primary/40 flex items-center justify-center neon-glow">
        <span class="material-symbols-outlined !text-3xl text-primary animate-pulse">sync</span>
      </div>
      <div>
        <h2 class="font-display text-2xl font-bold text-on-surface mb-2">Signing you in…</h2>
        <p class="text-on-surface-variant text-sm">Completing Discord authentication</p>
      </div>
    </div>

    <!-- Success -->
    <div id="auth-success" class="hidden flex-col items-center gap-6 text-center">
      <div class="h-16 w-16 rounded-2xl bg-green-500/20 border border-green-500/40 flex items-center justify-center">
        <span class="material-symbols-outlined !text-3xl text-green-400" style="font-variation-settings: 'FILL' 1;">check_circle</span>
      </div>
      <div>
        <h2 class="font-display text-2xl font-bold text-on-surface mb-2">Welcome!</h2>
        <p id="auth-success-username" class="text-on-surface-variant text-sm"></p>
        <p class="text-on-surface-variant/60 text-xs mt-1">Redirecting…</p>
      </div>
    </div>

    <!-- Error -->
    <div id="auth-error" class="hidden flex-col items-center gap-6 text-center">
      <div class="h-16 w-16 rounded-2xl bg-red-500/20 border border-red-500/40 flex items-center justify-center">
        <span class="material-symbols-outlined !text-3xl text-red-400" style="font-variation-settings: 'FILL' 1;">error</span>
      </div>
      <div>
        <h2 class="font-display text-2xl font-bold text-on-surface mb-2">Authentication failed</h2>
        <p id="auth-error-message" class="text-on-surface-variant text-sm mb-6">Something went wrong.</p>
        <a href="/" class="inline-flex items-center justify-center rounded-xl bg-surface-container border border-outline-variant text-on-surface font-bold px-8 py-3 hover:bg-surface-container-high transition-colors">
          <span class="material-symbols-outlined mr-2">arrow_back</span>
          Back to home
        </a>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var apiBase = 'https://api.bot-creator.fr';
  var loadingEl = document.getElementById('auth-loading');
  var successEl = document.getElementById('auth-success');
  var errorEl   = document.getElementById('auth-error');

  function showError(msg) {
    loadingEl.classList.add('hidden');
    errorEl.classList.remove('hidden');
    document.getElementById('auth-error-message').textContent = msg;
  }

  function showSuccess(username) {
    loadingEl.classList.add('hidden');
    successEl.classList.remove('hidden');
    document.getElementById('auth-success-username').textContent = 'Signed in as ' + username;
    setTimeout(function() { window.location.href = '/'; }, 1500);
  }

  var params = new URLSearchParams(window.location.search);
  var code  = params.get('code');
  var state = params.get('state');

  if (!code) {
    showError('No authorization code received from Discord. Please try logging in again.');
    return;
  }

  fetch(apiBase + '/auth/discord/exchange', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      code: code,
      state: state || '',
      redirect_uri: window.location.origin + '/auth/callback'
    })
  })
  .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
  .then(function(result) {
    if (!result.ok) {
      throw new Error(result.data.error || result.data.message || 'Exchange failed');
    }
    var data = result.data;
    localStorage.setItem('bc_token', data.token);
    localStorage.setItem('bc_owner_id', data.owner_id);
    localStorage.setItem('bc_user', JSON.stringify(data.user));
    showSuccess(data.user.username || data.user.global_name || 'User');
    updateHeaderUI(data.user);
  })
  .catch(function(err) {
    showError(err.message || 'Failed to complete authentication.');
  });
})();
</script>
