{% assign locale = include.locale %}
{% assign t = site.data.locales[locale] %}
<!DOCTYPE html>
<html lang="{{ locale }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1220">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link href="{{ '/css/main.css' | relative_url }}" rel="stylesheet">
  {% if include.markdown %}
  <link href="{{ '/css/highlight.css' | relative_url }}" rel="stylesheet">
  <link href="{{ '/css/markdown.css' | relative_url }}" rel="stylesheet">
  {% endif %}
  {% seo %}
  <link rel="alternate" hreflang="{{ include.locale }}" href="{{ page.url | absolute_url }}">
  <link rel="alternate" hreflang="{{ include.alternate_locale }}" href="{{ include.alternate_url | absolute_url }}">
  <link rel="alternate" hreflang="x-default" href="{{ site.data.locales.en.paths.home | absolute_url }}">
</head>
