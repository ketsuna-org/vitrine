{% assign t = include.t %}
{% assign downloads = site.data.downloads %}

<footer class="border-t border-outline-variant bg-surface-container-lowest py-12">
  <div class="mx-auto max-w-7xl px-6">
    <div class="flex flex-col items-center justify-between gap-8 md:flex-row">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary-container text-on-primary-container">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"></path>
          </svg>
        </div>
        <span class="text-lg font-bold tracking-tight text-on-surface font-display">{{ t.meta.site_title }}</span>
      </div>
      
      <div class="flex flex-wrap justify-center gap-8 text-sm font-medium text-on-surface-variant">
        <a class="hover:text-primary transition-colors" href="#">Conditions d'utilisation</a>
        <a class="hover:text-primary transition-colors" href="{{ t.paths.privacy | relative_url }}">{{ t.nav.privacy }}</a>
        <a class="hover:text-primary transition-colors" href="mailto:contact@bot-creator.fr">Contact</a>
        <a class="hover:text-primary transition-colors" href="#">Presse</a>
      </div>
      
      <div class="flex gap-4">
        <a class="flex h-10 w-10 items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:bg-primary-container hover:text-on-primary-container transition-colors" href="#">
          <span class="material-symbols-outlined text-xl">language</span>
        </a>
        <a class="flex h-10 w-10 items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:bg-primary-container hover:text-on-primary-container transition-colors" href="https://github.com/ketsuna-org/bot-creator">
          <span class="material-symbols-outlined text-xl">share</span>
        </a>
      </div>
    </div>
    
    <div class="mt-12 text-center text-xs text-on-surface-variant/60">
      © 2024 {{ t.meta.site_title }}. Tous droits réservés. Design Aetheric Tech.
    </div>
  </div>
</footer>
