{% assign t = include.t %}
{% assign active_key = page.translation_key %}
{% if page.layout == 'post' %}
  {% assign active_key = 'guides' %}
{% endif %}

<header class="sticky top-0 z-50 w-full glass-header">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-5">
    <a href="{{ t.paths.home | relative_url }}" class="flex items-center gap-3 group">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-primary-dark text-white shadow-ambient transition-all group-hover:scale-110 group-hover:bg-primary">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z" fill="currentColor"></path>
        </svg>
      </div>
      <span class="text-2xl font-bold tracking-tight text-primary-dark font-display">{{ t.meta.site_title }}</span>
    </a>

    <nav class="hidden md:flex items-center gap-12">
      <a class="text-[15px] font-semibold text-on-surface/70 hover:text-primary transition-colors{% if active_key == 'home' %} text-primary{% endif %}" href="{{ t.paths.home | relative_url }}">Fonctionnalités</a>
      <a class="text-[15px] font-semibold text-on-surface/70 hover:text-primary transition-colors{% if active_key == 'guides' %} text-primary{% endif %}" href="{{ t.paths.guides | relative_url }}">Tutoriels</a>
      <a class="text-[15px] font-semibold text-on-surface/70 hover:text-primary transition-colors" href="#">Tarifs</a>
    </nav>

    <div class="flex items-center gap-5">
      <button class="hidden sm:block text-[15px] font-bold text-primary-dark hover:text-primary transition-colors">Connexion</button>
      <a href="{{ t.paths.download | relative_url }}" class="flex h-12 items-center justify-center rounded-lg bg-primary px-7 text-[15px] font-bold text-white shadow-ambient hover:scale-[1.05] hover:shadow-premium-hover active:scale-[0.98] transition-all">
        S'inscrire
      </a>
      
      <button class="md:hidden flex items-center justify-center p-2 text-on-surface">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
</header>
