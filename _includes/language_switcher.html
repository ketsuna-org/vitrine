{% assign alt_locale = include.alternate_locale %}
<div class="language-switcher" aria-label="Language switcher">
  <span class="language-chip is-active">{{ include.locale | upcase }}</span>
  <a class="language-chip" href="{{ include.alternate_url }}" lang="{{ alt_locale }}">
    {{ alt_locale | upcase }}
  </a>
</div>
