    platform_note: "Use the app on the devices you already trust and keep the same product model as your workflow grows."
  capabilities:
    label: "Product surface"
    title: "Everything important lives in the same operating model."
    body: "Bot Creator is designed to reduce stack sprawl: creation, scripting, control, and runtime decisions stay connected instead of spreading across disconnected tools."
    cards:
      - title: "Design commands visually"
        body: "Build slash commands, options, and response flows without losing the shape of the bot."
      - title: "Write BDScript when it helps"
        body: "Drop into BDScript for the parts that need precision without abandoning the visual workflow."
      - title: "Control runtime from the same product"
        body: "Startup actions, logs, sync, and runtime checks stay near the build surface."
      - title: "Keep the default local-first"
        body: "Commands, workflows, variables, and logs stay local unless you deliberately choose otherwise."
      - title: "Use backup without adopting a backend"
        body: "Google Drive exists for backup and restore, not as a mandatory hosted layer."
      - title: "Add infrastructure only when it earns its place"
        body: "Reach for Linux or the Docker runner when uptime and remote execution become real operational needs."
  ownership:
    label: "Control and portability"
    title: "Keep ownership local, then expand deliberately."
    body: "Most teams should start with the app, prove the workflow, and only add more surface area when it solves a real problem."
    cards:
      - title: "Local-first workflow"
        body: "The core editing and runtime model is built to work from the app first, not from a server dashboard."
      - title: "Optional Google Drive backup"
        body: "Backup and restore stay available when you want portability across devices, without forcing hosted storage."
      - title: "Runner when uptime matters"
        body: "The Docker runner is there for longer-lived Linux workloads, Raspberry Pi setups, and remote operation."
