    rail_steps:
      - title: "Build"
        body: "Create commands, options, and reusable response logic in one workspace."
      - title: "Operate"
        body: "Keep logs, startup controls, and sync checks close to the bot itself."
      - title: "Scale"
        body: "Move to the Docker runner for Linux, Raspberry Pi, or remote runtime setups."
