home:
  hero:
    eyebrow: "Nouveau : Interface Drag & Drop"
    title: "Créez vos propres bots <span class='text-primary'>sans code</span>"
    body: "Transformez vos idées en automates puissants avec notre application mobile intuitive. Simple, rapide et sans aucune compétence technique requise."
    secondary_cta: "Lire les guides"
    stats: "Rejoint par +1,000 créateurs"
  showcase:
    title: "Une interface pensée pour la création"
    subtitle: "Simplicité visuelle, puissance fonctionnelle."
    cards:
      - title: "Constructeur Visuel"
        body: "Glissez-déposez des blocs logiques pour définir le comportement de votre bot en quelques secondes."
        icon: "category"
      - title: "Tableau de Bord"
        body: "Suivez les performances de vos automatisations en temps réel avec des graphiques clairs et précis."
        icon: "dashboard"
      - title: "Bibliothèque de Modèles"
        body: "Ne partez pas de zéro. Utilisez nos modèles pré-configurés pour les tâches les plus courantes."
        icon: "library_books"
  features:
    title: "Conçu pour la puissance. Pensé pour la vie privée."
    subtitle: "Une suite d'outils professionnels qui vous donne le contrôle total sur vos automatisations."
    items:
      - title: "Architecture locale d'abord"
        body: "Vos tokens de bot, configurations de commandes et bases de données résident entièrement sur votre appareil local ou runner auto-hébergé. Nous n'accédons jamais à vos clés privées, garantissant la sécurité de vos données."
        icon: "security"
      - title: "Moteur de script hybride"
        body: "Construisez visuellement avec des blocs logiques glisser-déposer, ou écrivez des commandes précises via notre parseur de script personnalisé. Compatible avec la syntaxe BDFD pour un contrôle total."
        icon: "code"
      - title: "Synchronisation multi-appareils"
        body: "Créez vos commandes en déplacement sur mobile, affinez-les sur votre espace de travail desktop, et déployez-les sur un runner Docker léger pour un fonctionnement 24h/24 et 7j/7."
        icon: "sync_alt"
  how_it_works:
    title: "Créez et déployez en trois étapes simples"
    subtitle: "Un workflow intuitif de la configuration initiale jusqu'à la mise en production 24h/24."
    steps:
      - title: "1. Créez votre application"
        body: "Enregistrez votre bot sur le portail développeur de Discord, copiez votre token secret, et saisissez-le dans l'éditeur local. Aucune configuration de serveur requise."
      - title: "2. Concevez vos commandes"
        body: "Construisez des commandes slash et des gestionnaires d'événements via notre éditeur visuel. Pour aller plus loin, écrivez vos scripts avec auto-complétion."
      - title: "3. Hébergez avec Docker"
        body: "Exportez vos configurations sur notre image Docker légère. Lancez-la sur un VPS, serveur domestique ou Raspberry Pi pour un uptime garanti."
  faq:
    title: "Questions Fréquentes"
    subtitle: "Tout ce que vous devez savoir sur Bot Creator."
    items:
      - q: "Ai-je besoin de savoir programmer ?"
        a: "Non ! Vous pouvez concevoir des bots complets via notre constructeur visuel. Pour les utilisateurs avancés, notre langage de script est simple et documenté."
      - q: "Mon token de bot est-il sécurisé ?"
        a: "Oui. Bot Creator est local-first. Nous ne stockons ni ne transmettons vos tokens. Tout reste en local sur votre appareil ou votre propre serveur."
      - q: "Comment faire tourner mon bot 24h/24 ?"
        a: "Pour un uptime constant, utilisez notre runner Docker. Vous pouvez l'héberger sur n'importe quel VPS, serveur personnel ou Raspberry Pi."
      - q: "Puis-je importer la syntaxe BDFD ?"
        a: "Oui ! Notre interpréteur de scripts est conçu pour être compatible avec les règles de formatage standards de BDScript/BDFD."
  blog:
    title: "Blog et Tutoriels"
    subtitle: "Apprenez à maîtriser l'automatisation mobile."
    view_all: "Tout voir"
    posts:
      - title: "Comment créer votre premier bot en 10 minutes"
        excerpt: "Découvrez les bases de notre interface et configurez votre première automatisation simple pour gagner du temps au quotidien."
        tag: "Tutoriel"
        time: "5 min de lecture"
      - title: "Optimiser vos automatisations pour la performance"
        excerpt: "Apprenez les techniques avancées pour rendre vos bots plus rapides et plus fiables grâce aux conditions logiques complexes."
        tag: "Expert"
        time: "8 min de lecture"
      - title: "Nouvelles intégrations avec vos services favoris"
        excerpt: "Bot-Creator se connecte désormais à plus de 50 nouvelles applications. Découvrez comment étendre vos possibilités."
        tag: "Nouveauté"
        time: "3 min de lecture"
  cta:
    title: "Prêt à automatiser votre succès ?"
    body: "Rejoignez des milliers d'utilisateurs qui gagnent du temps chaque jour grâce à leurs propres bots personnalisés."
    primary: "Télécharger maintenant"
    secondary: "Contacter le support"

