release_page: "https://github.com/ketsuna-org/bot-creator/releases/latest"
release_notes_page: "https://github.com/ketsuna-org/bot-creator/releases"
runner_guide_url: "https://github.com/ketsuna-org/bot-creator/blob/main/docs/runner-docker.md"
docker_image: "ketsuna-org/bot-creator-runner:latest"

stores:
  android_play:
    label: "Google Play"
    url: "https://play.google.com/store/apps/details?id=fr.botcreator.app"
  steam:
    label: "Steam"
    url: "https://store.steampowered.com/app/YOUR_APP_ID"
  windows_store:
    label: "Microsoft Store"
    url: "https://apps.microsoft.com/detail/9p6t5wmbmzlr?hl=fr-FR&gl=FR"
  ios_appstore:
    label: "App Store"
    url: "https://apps.apple.com/us/app/bot-creator-for-discord/id6760181193"

runner:
  web_url: "http://localhost:8080"
  commands:
    pull: "docker pull garder500/bot-creator-runner:latest"
    volume: "docker volume create bot_creator_data"
    run: "docker run --rm -p 8080:8080 -v bot_creator_data:/data ketsuna-org/bot-creator-runner:latest"
  notes:
    - "Starts a browser-based runner UI for selecting, starting, and stopping bots."
    - "Persists Google Drive OAuth tokens and runner logs inside the mounted /data volume."
    - "Best suited for Linux servers, Raspberry Pi, and remote bot hosting setups."
